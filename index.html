<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4e73df, #1cc88a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 15px;
        }

        .btn-custom {
            background-color: #4e73df;
            color: white;
        }

        .btn-custom:hover {
            background-color: #2e59d9;
        }

        footer {
            font-size: 14px;
            color: #6c757d;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow-lg p-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-primary">🎓 Grade Calculator</h2>
                        <p class="text-muted">
                            Enter marks for five subjects and calculate your grade instantly.
                        </p>
                    </div>

                    <div class="d-grid">
                        
                    </div>

                    <hr>

                    <div class="text-center">
                        <p id="result" class="fw-semibold text-dark"></p>
                    </div>

                </div>

                <footer class="text-center mt-3">
                    © 2026 Simple Grade Calculator | Developed by Arya devi s
                </footer>

            </div>
        </div>
    </div>

    <!-- JavaScript File -->
    <script src="js/mark.js"></script>

</body>
</html>
